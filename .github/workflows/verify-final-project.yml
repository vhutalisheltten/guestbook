name: Verify Guestbook Final Project

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4

      - name: Build v1 and v2 images
        run: |
          docker build -t guestbook:v1 v1/guestbook
          docker build -t guestbook:v2 v2/guestbook

      - name: Capture Guestbook v1 application
        run: |
          docker run -d -p 3000:3000 --name guestbook-app guestbook:v1
          sleep 3
          curl --fail http://localhost:3000
          npx playwright install --with-deps chromium
          npx playwright screenshot --viewport-size=1440,900 http://localhost:3000 app.png

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: guestbook

      - name: Load images
        run: |
          kind load docker-image guestbook:v1 --name guestbook
          kind load docker-image guestbook:v2 --name guestbook

      - name: Install metrics server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type=json \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=180s

      - name: Apply Guestbook deployment
        run: |
          sed 's#us.icr.io/YOUR_NAMESPACE/guestbook:v1#guestbook:v1#' v1/guestbook/deployment.yml > /tmp/deployment.yml
          sed -i 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/' /tmp/deployment.yml
          sed -i 's/cpu: 5m/cpu: 50m/' /tmp/deployment.yml
          sed -i 's/cpu: 2m/cpu: 20m/' /tmp/deployment.yml
          kubectl apply -f /tmp/deployment.yml | tee 07-deployment-apply
          kubectl apply -f v1/guestbook/service.yml
          kubectl rollout status deployment/guestbook --timeout=180s

      - name: Create HPA with zero current replicas
        run: |
          kubectl autoscale deployment guestbook --cpu-percent=5 --min=1 --max=10
          kubectl get hpa guestbook | tee hpa

      - name: Confirm increased replicas
        run: |
          kubectl patch hpa guestbook --type=merge -p '{"spec":{"minReplicas":3}}'
          kubectl wait --for=jsonpath='{.status.currentReplicas}'=3 hpa/guestbook --timeout=180s
          kubectl get hpa guestbook | tee hpa2

      - name: Apply updated v2 deployment
        run: |
          sed 's#us.icr.io/YOUR_NAMESPACE/guestbook:v1#guestbook:v2#' v1/guestbook/deployment.yml > /tmp/deployment-v2.yml
          sed -i 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/' /tmp/deployment-v2.yml
          kubectl apply -f /tmp/deployment-v2.yml | tee deployment
          kubectl rollout status deployment/guestbook --timeout=180s

      - name: Capture v2 application
        run: |
          docker run -d -p 3001:3000 --name guestbook-v2 guestbook:v2
          sleep 3
          curl --fail http://localhost:3001
          npx playwright screenshot --viewport-size=1440,900 http://localhost:3001 up-app.png

      - name: Capture revision details and roll back
        run: |
          kubectl delete hpa guestbook
          kubectl scale deployment guestbook --replicas=1
          kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 deployment/guestbook --timeout=180s
          kubectl rollout history deployment/guestbook
          kubectl rollout history deployments guestbook --revision=2 | tee rev
          kubectl get rs
          kubectl rollout undo deployment/guestbook --to-revision=1
          kubectl rollout status deployment/guestbook --timeout=180s
          kubectl get rs | tee rs

      - name: Upload terminal evidence
        uses: actions/upload-artifact@v4
        with:
          name: guestbook-terminal-evidence
          path: |
            hpa
            hpa2
            deployment
            rev
            rs
            app.png
            up-app.png
